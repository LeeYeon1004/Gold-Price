[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gnumake", "gcc"]

[phases.install]
cmds = [
  "npm --prefix backend install",
  "npm --prefix backend rebuild better-sqlite3",
  "npm --prefix frontend install"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = "FRONTEND_DIST=frontend/dist/frontend/browser node backend/src/app.js"
