<div class="flex flex-col h-full space-y-4">
  <!-- Chart -->
  @if (loading) {
    <div class="shimmer flex-1 min-h-[250px] rounded-xl"></div>
  } @else if (hasData) {
    <highcharts-chart
      [options]="chartOptions"
      style="width: 100%; height: 100%; display: block; min-height: 250px;"
      class="animate-fade-in flex-1">
    </highcharts-chart>
  } @else {
    <div class="flex-1 min-h-[250px] flex items-center justify-center text-slate-500">
      <div class="text-center">
        <div class="text-3xl mb-2">📈</div>
        <p class="text-sm">No data available</p>
      </div>
    </div>
  }
</div>
