<!-- Global loading bar -->
@if (loading.isLoading()) {
  <div class="fixed top-0 left-0 right-0 z-[9999] h-1 bg-slate-200 overflow-hidden">
    <div class="h-full bg-amber-500 animate-loading-bar"></div>
  </div>
}

<div class="h-screen flex flex-col bg-slate-50">
  <app-navbar/>
  <main class="flex-1 min-h-0 overflow-y-auto lg:overflow-hidden flex flex-col">
    <router-outlet/>
  </main>
</div>
